services:
  minibib:
    image: minibib:latest
    container_name: minibib
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    networks:
      - minibib-network
    volumes:
      - ./:/var/www/html
    environment:
      HOME: /tmp
    user: "${UID:-1000}:${GID:-1000}"

  mariadb:
    image: mariadb:11
    container_name: minibib_mariadb
    restart: always
    environment:
      MYSQL_DATABASE: minibib
      MYSQL_USER: minibib
      MYSQL_PASSWORD: minibib
      MYSQL_ROOT_PASSWORD: minibib
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - minibib-network

  selenium:
    image: selenium/standalone-chrome
    container_name: minibib_selenium
    ports:
      - "7900:7900" # VNC (pra ver o browser rodando)
    networks:
      - minibib-network
    shm_size: 2gb
  senhaunica-faker:
    image: uspdev/senhaunica-faker
    container_name: minibib_senhaunica-faker
    ports:
      - "3141:3141"
    environment:
          - APP_URL=http://auth.local:3141
    networks:
      minibib-network:
        aliases:
          - auth.local

networks:
  minibib-network:
  

volumes:
  mariadb_data: